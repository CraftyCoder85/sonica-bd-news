name: FT news feed
on:
  schedule:
    - cron: '0 6 * * *'   # daily, 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node fetch_news.mjs
      - name: Commit news.json if changed
        run: |
          git config user.name "ft-news-bot"
          git config user.email "actions@github.com"
          git add news.json
          git diff --cached --quiet || git commit -m "ft-news: daily update"
          git push
